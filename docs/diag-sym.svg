<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 110" font-family="system-ui,sans-serif">
  <rect width="300" height="110" fill="#f8fafd"/>

  <!-- labels -->
  <text x="72"  y="11" text-anchor="middle" font-size="8" font-style="italic" fill="#969696">symmetric</text>
  <text x="228" y="11" text-anchor="middle" font-size="8" font-style="italic" fill="#969696">one-sided</text>

  <!-- left block (symmetric) -->
  <rect x="32" y="20" width="80" height="60" fill="#90bbd8" stroke="#1e5d8c" stroke-width="1.5"/>
  <!-- right block (one-sided) -->
  <rect x="188" y="20" width="80" height="60" fill="#90bbd8" stroke="#1e5d8c" stroke-width="1.5"/>

  <!-- Z=0 lines -->
  <line x1="72"  y1="14" x2="72"  y2="92" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="72"  y="12" text-anchor="middle" font-size="7" fill="#c62828">Z=0</text>
  <line x1="188" y1="14" x2="188" y2="92" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="188" y="12" text-anchor="middle" font-size="7" fill="#c62828">Z=0</text>

  <!-- symmetric W/2 + W/2 annotation -->
  <line x1="32"  y1="88" x2="112" y2="88" stroke="#c62828" stroke-width="1.2"/>
  <line x1="32"  y1="84" x2="32"  y2="92" stroke="#c62828" stroke-width="1.2"/>
  <line x1="72"  y1="84" x2="72"  y2="92" stroke="#c62828" stroke-width="1.2"/>
  <line x1="112" y1="84" x2="112" y2="92" stroke="#c62828" stroke-width="1.2"/>
  <polygon points="32,88  41,84  41,92"  fill="#c62828"/>
  <polygon points="72,88  63,84  63,92"  fill="#c62828"/>
  <polygon points="72,88  81,84  81,92"  fill="#c62828"/>
  <polygon points="112,88 103,84 103,92" fill="#c62828"/>
  <text x="52" y="103" text-anchor="middle" font-size="8" fill="#c62828">W/2</text>
  <text x="92" y="103" text-anchor="middle" font-size="8" fill="#c62828">W/2</text>

  <!-- one-sided W annotation -->
  <line x1="188" y1="88" x2="268" y2="88" stroke="#c62828" stroke-width="1.2"/>
  <line x1="188" y1="84" x2="188" y2="92" stroke="#c62828" stroke-width="1.2"/>
  <line x1="268" y1="84" x2="268" y2="92" stroke="#c62828" stroke-width="1.2"/>
  <polygon points="188,88 197,84 197,92" fill="#c62828"/>
  <polygon points="268,88 259,84 259,92" fill="#c62828"/>
  <text x="228" y="103" text-anchor="middle" font-size="8" fill="#c62828">W</text>
</svg>
