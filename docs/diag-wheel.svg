<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 132" font-family="system-ui,sans-serif">
  <rect width="300" height="132" fill="#f8fafd"/>

  <!-- ── FRONT VIEW ── -->
  <text x="74" y="11" text-anchor="middle" font-size="8" font-style="italic" fill="#969696">front view</text>

  <!-- wheel disc -->
  <circle cx="74" cy="74" r="50" fill="#90bbd8" stroke="#1e5d8c" stroke-width="2"/>
  <!-- hub bore -->
  <circle cx="74" cy="74" r="13" fill="#f8fafd" stroke="#1e5d8c" stroke-width="1.5"/>
  <!-- hub label leader -->
  <line x1="87" y1="70" x2="105" y2="55" stroke="#969696" stroke-width="1"/>
  <text x="107" y="59" font-size="8" fill="#969696">hub ⌀</text>

  <!-- D arrow (front view) -->
  <line x1="127" y1="24" x2="140" y2="24" stroke="#c62828" stroke-width="1.2"/>
  <line x1="127" y1="124" x2="140" y2="124" stroke="#c62828" stroke-width="1.2"/>
  <line x1="137" y1="24"  x2="137" y2="124" stroke="#c62828" stroke-width="1.5"/>
  <polygon points="137,24  133,34 141,34"  fill="#c62828"/>
  <polygon points="137,124 133,114 141,114" fill="#c62828"/>
  <text x="148" y="79" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">D</text>

  <!-- ── SIDE VIEW ── -->
  <text x="228" y="11" text-anchor="middle" font-size="8" font-style="italic" fill="#969696">side view</text>

  <!-- wheel body -->
  <rect x="202" y="24" width="52" height="100" fill="#90bbd8" stroke="#1e5d8c" stroke-width="2"/>
  <!-- hub bore (dashed outline) -->
  <rect x="202" y="61" width="52" height="26" fill="#f8fafd"
        stroke="#1e5d8c" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- W arrow -->
  <line x1="202" y1="14" x2="254" y2="14" stroke="#c62828" stroke-width="1.5"/>
  <line x1="202" y1="10" x2="202" y2="20" stroke="#c62828" stroke-width="1.5"/>
  <line x1="254" y1="10" x2="254" y2="20" stroke="#c62828" stroke-width="1.5"/>
  <polygon points="202,14 211,10 211,18" fill="#c62828"/>
  <polygon points="254,14 245,10 245,18" fill="#c62828"/>
  <text x="228" y="10" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">W</text>

  <!-- D arrow (side view) -->
  <line x1="259" y1="24"  x2="272" y2="24"  stroke="#c62828" stroke-width="1.2"/>
  <line x1="259" y1="124" x2="272" y2="124" stroke="#c62828" stroke-width="1.2"/>
  <line x1="269" y1="24"  x2="269" y2="124" stroke="#c62828" stroke-width="1.5"/>
  <polygon points="269,24  265,34 273,34"  fill="#c62828"/>
  <polygon points="269,124 265,114 273,114" fill="#c62828"/>
  <text x="281" y="79" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">D</text>
</svg>
